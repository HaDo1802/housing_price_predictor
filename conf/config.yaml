# Configuration — single source of truth for training pipeline.
# Column names match gold.mart_property_current exactly.

data:
  raw_data_path: "data/raw/data_master.csv"
  target_column: "price"
  test_size: 0.2
  val_size: 0.0
  random_state: 42

features:
  numeric:
    - "bedrooms"
    - "bathrooms"
    - "living_area"                # was: livingarea (old alias)
    - "latitude"
    - "longitude"
    - "normalized_lot_area_value"  # new: lot size is real signal
  categorical:
    - "property_type"              # was: propertytype (old alias)
    - "vegas_district"             # new: stronger signal than lat/lon alone

preprocessing:
  handle_missing: "mean"
  handle_outliers: true
  outlier_method: "ppsf_band"     # filter on price-per-sqft, not raw IQR
  outlier_ppsf_min: 80.0          # below = data error or land-only listing
  outlier_ppsf_max: 800.0         # above = ultra-luxury, too few to learn from
  outlier_min_livingarea: 400.0
  exclude_property_types:
    - "MOBILE"                    # different market (lot-lease), median $124k vs $490k
  scale_features: true
  scaling_method: "standard"
  encode_categorical: true
  encoding_method: "onehot"
  target_transform: "log1p"       # price is right-skewed, log stabilises variance
  interval_num_segments: 5
  interval_min_segment_size: 10

model:
  model_type: "hist_gradient_boosting"
  random_state: 42
  hyperparameters:
    learning_rate: 0.03
    max_iter: 1200
    max_leaf_nodes: 63
    min_samples_leaf: 8
    l2_regularization: 0.0

training:
  experiment_name: "house_price_prediction"
  run_name: "hgb_v2_new_features"
  registry_model_name: "housing_price_predictor"
  model_output_dir: "models/production"
