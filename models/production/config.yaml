# Simplified Configuration for Single Model Training

# Data Configuration
data:
  raw_data_path: "data/raw/data_master.csv"
  target_column: "price"
  test_size: 0.2
  val_size: 0.1
  random_state: 42

features:
  numeric:
    - "bedrooms"
    - "bathrooms"
    - "livingarea"

  categorical:
    - "propertytype"
    - "vegas_district"

# Preprocessing Configuration
preprocessing:
  handle_missing: "mean"
  scale_features: true
  scaling_method: "standard"
  encode_categorical: true
  encoding_method: "onehot"
  target_transform: "log1p"

model:
  model_type: "random_forest"
  random_state: 42
  hyperparameters:
    n_estimators: 400
    max_depth: 14
    min_samples_leaf: 2
    max_features: "sqrt"

# Training Configuration
training:
  experiment_name: "house_price_prediction_test_2"
  run_name: "test_different model"
  registry_model_name: "housing_price_predictor"
  model_output_dir: "models/production"
